<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shopee Generator Info Ultimate</title>
    <style>
        :root {
            --primary-color: #ee4d2d;
            --bg-color: #f4f6f9;
            --text-color: #333;
            --border-radius: 8px;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 10px;
            color: var(--text-color);
            -webkit-tap-highlight-color: transparent;
        }
        .main-wrapper {
            max-width: 100%;
            margin: 0 auto;
        }
        @media (min-width: 768px) {
            body { padding: 25px; }
            .main-wrapper { max-width: 1000px; }
        }
        .container, .history-box {
            background: #ffffff;
            padding: 16px;
            border-radius: var(--border-radius);
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            margin-bottom: 15px;
        }
        h2 {
            color: var(--primary-color);
            text-align: center;
            font-size: 20px;
            margin: 5px 0 20px 0;
            font-weight: bold;
        }
        h3 {
            color: #333;
            font-size: 16px;
            margin: 0;
        }
        .form-row {
            display: flex;
            gap: 10px;
        }
        .form-group {
            margin-bottom: 14px;
            flex: 1;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            color: #555;
            font-size: 13px;
        }
        .input-group {
            display: flex;
            position: relative;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px 10px;
            border: 1px solid #ddd;
            border-radius: var(--border-radius);
            font-size: 14px;
            background: #fafafa;
            box-sizing: border-box;
            transition: border 0.2s;
        }
        input:focus {
            outline: none;
            border-color: var(--primary-color);
            background: #fff;
        }
        input.input-source {
            background: #fffdeb !important;
            border: 1px solid #e0d090;
        }
        button.btn-copy {
            background: #f0f0f0;
            border: 1px solid #ddd;
            border-left: none;
            padding: 0 14px;
            border-radius: 0 var(--border-radius) var(--border-radius) 0;
            font-size: 13px;
            font-weight: bold;
            color: var(--primary-color);
            margin-left: -5px;
            z-index: 2;
            cursor: pointer;
        }
        button.btn-copy:active { background: #e0e0e0; }
        input.has-btn {
            border-radius: var(--border-radius) 0 0 var(--border-radius);
        }
        
        .checkbox-group {
            display: flex;
            gap: 15px;
            margin: 10px 0 15px 0;
            background: #fff9f8;
            padding: 10px;
            border-radius: var(--border-radius);
            border: 1px dashed #ffc5ba;
        }
        .checkbox-label {
            display: flex;
            align-items: center;
            font-size: 13px;
            font-weight: bold;
            color: #e65100;
            cursor: pointer;
            margin: 0;
        }
        .checkbox-label input {
            margin-right: 6px;
            width: 16px;
            height: 16px;
            accent-color: var(--primary-color);
        }

        button.btn-main {
            width: 100%;
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 14px;
            font-size: 15px;
            font-weight: bold;
            border-radius: var(--border-radius);
            margin-top: 10px;
            box-shadow: 0 3px 6px rgba(238, 77, 45, 0.2);
            cursor: pointer;
        }
        button.btn-main:active { background: #d73c1f; }
        
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: #fff;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 13px;
            z-index: 9999;
            display: none;
        }
        
        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }
        button.btn-danger {
            background: #dc3545;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
        }
        
        .desktop-table { display: none; }
        .mobile-cards { display: block; }

        .card-item {
            background: #f8f9fa;
            border: 1px solid #eaeaea;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 12px;
            position: relative;
        }
        .card-row {
            display: flex;
            margin-bottom: 5px;
            font-size: 13px;
        }
        .card-label {
            width: 90px;
            color: #777;
            font-weight: 500;
        }
        .card-value {
            flex: 1;
            font-weight: 600;
            color: #222;
            word-break: break-word;
        }
        .badge-ip {
            background: #007bff;
            color: white;
            padding: 1px 5px;
            border-radius: 3px;
            font-size: 11px;
            font-family: monospace;
        }
        .badge-gender {
            padding: 1px 5px;
            border-radius: 3px;
            font-size: 11px;
        }
        .gender-nam { background: #e3f2fd; color: #0d47a1; }
        .gender-nu { background: #fce4ec; color: #880e4f; }
        
        .card-action-btn {
            width: 100%;
            background: #fff;
            border: 1px solid #ddd;
            padding: 6px;
            margin-top: 8px;
            font-size: 12px;
            border-radius: 4px;
            color: #555;
            font-weight: bold;
            cursor: pointer;
        }

        .section-title {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin: 10px 0 5px 0;
            border-bottom: 1px solid #f0f0f0;
            padding-bottom: 3px;
        }

        @media (min-width: 768px) {
            .desktop-table { display: table; width: 100%; border-collapse: collapse; font-size: 13px; }
            .desktop-table th, .desktop-table td { padding: 10px; border: 1px solid #eee; text-align: left; }
            .desktop-table th { background: #f8f9fa; }
            .mobile-cards { display: none; }
        }
    </style>
</head>
<body>

<div id="toast" class="toast"></div>

<div class="main-wrapper">
    <div class="container">
        <h2>Shopee Auto Gen Ultimate</h2>
        
        <div class="section-title">Nhập Dữ Liệu Gốc</div>
        <div class="form-row">
            <div class="form-group">
                <label>SĐT:</label>
                <input type="text" id="source_phone" class="input-source" placeholder="Ví dụ: 0123456789">
            </div>
            <div class="form-group">
                <label>Địa chỉ / Số nhà gốc:</label>
                <input type="text" id="source_address" class="input-source" placeholder="Ví dụ: 33/45 hà nội">
            </div>
        </div>

        <div class="section-title">Gen Info</div>
        <div class="form-group">
            <label>IP Mạng / Proxy hiện tại:</label>
            <div class="input-group">
                <input type="text" id="current_ip" class="has-btn" value="Đang check IP..." readonly style="color:#007bff; font-weight: bold;">
                <button class="btn-copy" onclick="copyText('current_ip')">Copy</button>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group" style="flex: 1.5;">
                <label>Họ và Tên thật:</label>
                <div class="input-group">
                    <input type="text" id="fullname" class="has-btn" readonly>
                    <button class="btn-copy" onclick="copyText('fullname')">Copy</button>
                </div>
            </div>
            <div class="form-group" style="flex: 0.8;">
                <label>G.Tính:</label>
                <input type="text" id="gender" readonly style="font-weight: bold; text-align: center;">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group" style="flex: 1.2;">
                <label>Ngày tháng năm sinh:</label>
                <div class="input-group">
                    <input type="text" id="birthday" class="has-btn" readonly>
                    <button class="btn-copy" onclick="copyText('birthday')">Copy</button>
                </div>
            </div>
            <div class="form-group" style="flex: 1.2;">
                <label>SĐT Đã Chỉnh:</label>
                <div class="input-group">
                    <!-- ĐÃ CẬP NHẬT PHẦN PHIÊN BẢN FULL THEO ĐÚNG YÊU CẦU TRỰC QUAN -->
                    <input type="text" id="phone" class="has-btn" readonly style="color:#e65100; font-weight:bold; font-size: 13px;" placeholder="VD: [Liên hệ trực tiếp 0123_456_789]">
                    <button class="btn-copy" onclick="copyText('phone')">Copy</button>
                </div>
            </div>
        </div>

        <div class="form-group">
            <label>Username (Bypass AI Shopee):</label>
            <div class="input-group">
                <input type="text" id="username" class="has-btn" readonly style="font-family:monospace; font-weight:bold; color:#2e7d32;">
                <button class="btn-copy" onclick="copyText('username')">Copy</button>
            </div>
        </div>

        <div class="form-group">
            <label>Mật khẩu:</label>
            <div class="input-group">
                <input type="text" id="password" class="has-btn" readonly>
                <button class="btn-copy" onclick="copyText('password')">Copy</button>
            </div>
        </div>

        <div class="form-group">
            <label>Địa chỉ nhận hoàn chỉnh:</label>
            <div class="input-group">
                <input type="text" id="address" class="has-btn" readonly style="font-size: 13px;">
                <button class="btn-copy" onclick="copyText('address')">Copy</button>
            </div>
        </div>

        <div class="checkbox-group">
            <label class="checkbox-label">
                <input type="checkbox" id="opt_note_phone" checked> Note Số vào địa chỉ
            </label>
            <label class="checkbox-label">
                <input type="checkbox" id="opt_random_brand" checked> ADD Ngẫu Nhiên Cửa hàng
            </label>
        </div>

        <button class="btn-main" id="btn-generate" onclick="generateAndLogInfo()">Random Info</button>
    </div>

    <div class="history-box">
        <div class="history-header">
            <h3>Info Set Account (Log)</h3>
            <button class="btn-danger" onclick="clearHistory()">XÓA HẾT</button>
        </div>

        <table class="desktop-table">
            <thead>
                <tr>
                    <th width="4%">STT</th>
                    <th width="10%">IP</th>
                    <th>Họ Tên</th>
                    <th width="6%">G.Tính</th>
                    <th width="20%">SĐT Biến tấu</th>
                    <th width="10%">Username</th>
                    <th width="10%">Mật Khẩu</th>
                    <th>Địa Chỉ</th>
                </tr>
            </thead>
            <tbody id="desktop-tbody"></tbody>
        </table>

        <div id="mobile-cards-area" class="mobile-cards"></div>
    </div>
</div>

<script>
    const ho = ["Nguyễn", "Trần", "Lê", "Phạm", "Hoàng", "Phan", "Vũ", "Đặng", "Bùi", "Đỗ", "Hồ", "Ngô", "Dương", "Lý", "Huỳnh", "Võ"];
    const demNam = ["Văn", "Đức", "Quang", "Minh", "Anh", "Tuấn", "Duy", "Hữu", "Thành", "Quốc", "Xuân", "Trọng"];
    const tenNam = ["Hùng", "Dũng", "Sơn", "Hải", "Đông", "Nam", "An", "Bình", "Tuấn", "Khánh", "Long", "Tùng", "Thịnh"];
    const demNu = ["Thị", "Ngọc", "Thu", "Hồng", "Phương", "Thanh", "Minh", "Bích", "Tuyết"];
    const tenNu = ["Trang", "Linh", "Hương", "Thảo", "Phượng", "Tú", "Vy", "Yến", "An", "Hà", "Mai", "Nhi"];
    
    const dauSo = ["096", "097", "098", "086", "032", "033", "034", "035", "036", "037", "038", "039", "090", "093", "070", "076", "077", "078", "079", "089", "091", "094", "088", "081", "082", "083", "084", "085"];
    const tapHoaBrands = ["Tạp Hóa", "Shop", "Cửa Hàng", "Đại Lý", "Tiệm Sửa Xe", "Salon", "Quán Ăn", "Tiệm Điện Thoại", "Điện Máy", "Cơm Tấm", "Cà Phê"];
    const tenRiengBrands = ["Lan", "Hùng", "Mai", "Tuấn", "Thanh", "Vinh", "Mỹ", "Phượng", "Đức", "Khánh", "An", "Thịnh", "24h", "Mini"];

    const dataHauGiang = {
        tinh: "Tỉnh Hậu Giang", quan: "Thành phố Vị Thanh",
        phuongXa: [
            { xa: "Xã Hỏa Lựu", tuyen: ["Ấp Thạnh Hòa I", "Ấp Thạnh Hòa II", "Ấp Thạnh Trung"] },
            { xa: "Xã Tân Tiến", tuyen: ["Ấp Thạnh Lợi", "Ấp Thạnh Hòa", "Đường khóm Cầu Đúc"] },
            { xa: "Phường VII", tuyen: ["Đường Trần Hưng Đạo", "Đường Nguyễn Huệ"] }
        ]
    };

    let currentIpAddress = "0.0.0.0";

    async function fetchIp() {
        try {
            let response = await fetch('https://api.ipify.org?format=json');
            let data = await response.json();
            currentIpAddress = data.ip;
            document.getElementById("current_ip").value = currentIpAddress;
        } catch (e) {
            currentIpAddress = "127.0.0.1";
            document.getElementById("current_ip").value = currentIpAddress;
        }
    }

    function removeVietnameseTones(str) {
        str = str.replace(/à|á|ạ|ả|ã|â|ầ|á|ậ|ẩ|ẫ|ă|ằ|ắ|ặ|ẳ|ẵ/g,"a");
        str = str.replace(/è|é|ẹ|ẻ|ẽ|ê|ề|ế|ệ|ể|ễ/g,"e");
        str = str.replace(/ì|í|ị|ỉ|ĩ/g,"i");
        str = str.replace(/ò|ó|ọ|ỏ|õ|ô|ồ|ố|ộ|ổ|ỗ|ơ|ờ|ớ|ợ|ở|ỡ/g,"o");
        str = str.replace(/ù|ú|ụ|ủ|ũ|ư|ừ|ứ|ự|ử|ữ/g,"u");
        str = str.replace(/ỳ|ý|ỵ|ỷ|ỹ/g,"y");
        str = str.replace(/đ/g,"d");
        return str.toLowerCase();
    }

    // --- SIÊU THUẬT TOÁN BIẾN TẤU SĐT BYPASS AI KHÔNG ĐỔI SỐ ---
    function superTweakPhone(srcPhone) {
        let clean = srcPhone.replace(/\D/g, ''); 
        if (clean.length < 9) {
            clean = getRandom(dauSo) + Math.floor(1000000 + Math.random() * 8999999);
        }

        let p = clean.split('');

        function fakeChar(char) {
            if (char === '0') return getRandom(['o', 'O', '0']);
            if (char === '1') return getRandom(['l', 'I', '1']);
            return char;
        }

        let f = p.map(c => fakeChar(c));

        let s1 = f.slice(0,4).join('');
        let s2 = f.slice(4,7).join('');
        let s3 = f.slice(7).join('');

        let formats = [
            `${s1}..${s2}..${s3}`,
            `${s1}_${s2}_${s3}`,
            `${s1} ${s2} ${s3}`,
            `${f.join('-')}`,
            `${s1}*${s2}*${s3}`,
            `[${s1}]-${s2}-${s3}`,
            `${s1}/${s2}/${s3}`,
            `0${clean.substring(1)}`, 
            `Sđt:${s1}.${s2}.${s3}`,
            `${s1}~${s2}~${s3}`,
            `${s1} ${s2}${s3}`,
            `lh:${f.join('')}`
        ];

        if(clean.startsWith("032")) formats.push(`không ba hai ${s2} ${s3}`);
        if(clean.startsWith("039")) formats.push(`không ba chín ${s2} ${s3}`);
        if(clean.startsWith("09")) formats.push(`không chín ${clean.substring(2,5)} ${clean.substring(5)}`);

        return getRandom(formats);
    }

    function tweakStreetAddress(srcAddr) {
        if (!srcAddr.trim()) return `Số ${Math.floor(1 + Math.random() * 199)}`;
        
        let addr = srcAddr.trim();
        let slashRegex = /(\d+)\/(\d+)/;
        
        if (slashRegex.test(addr)) {
            let match = addr.match(slashRegex);
            let truoc = match[1];
            let sau = match[2];
            let rest = addr.replace(slashRegex, '').trim(); 

            let variants = [
                `Số ${truoc}/${sau} ${rest}`,
                `Hẻm ${truoc} Số ${sau} ${rest}`,
                `Số ${truoc} Hẻm ${sau} ${rest}`,
                `${truoc} xẹt ${sau} Đường ${rest}`,
                `Vào hẻm ${truoc}/${sau} ${rest}`,
                `Nhà số ${truoc} hẹt ${sau} ${rest}`,
                `${truoc}/${sau} ${rest}`
            ];
            return getRandom(variants);
        } else {
            let prefixes = ["Số ", "Nhà số ", "Khu ", "", "Ngay số "];
            return getRandom(prefixes) + addr;
        }
    }

    // --- PHÁT TRIỂN HƠN 30 BIẾN TẤU MẪU CÂU NOTE ĐỊA CHỈ ---
    function getAdvancedNote(tweakedPhone) {
        let templates = [
            ` [LH ${tweakedPhone}]`,
            ` [Sđt ${tweakedPhone}]`,
            ` [Alo ${tweakedPhone}]`,
            ` (Giao gọi: ${tweakedPhone})`,
            ` (Liên hệ: ${tweakedPhone})`,
            ` [Call me ${tweakedPhone}]`,
            ` (Đt bàn giao: ${tweakedPhone})`,
            ` - Số ĐT: ${tweakedPhone}`,
            ` / Phone: ${tweakedPhone}`,
            ` [Gặp nhận hàng: ${tweakedPhone}]`,
            ` _Ship gọi ${tweakedPhone}`,
            ` (Không đổi số: ${tweakedPhone})`,
            ` [Mọi chi tiết gọi ${tweakedPhone}]`,
            ` [Số chính chủ: ${tweakedPhone}]`,
            ` (đt liên lạc: ${tweakedPhone})`,
            ` [Hotline ${tweakedPhone}]`,
            ` - ĐT Nhận: ${tweakedPhone}`,
            ` (Alo khi tới: ${tweakedPhone})`,
            ` [Vui lòng gọi ${tweakedPhone}]`,
            ` [Liên hệ trực tiếp ${tweakedPhone}]`
        ];
        return getRandom(templates);
    }

    function generateAndLogInfo() {
        fetchIp();
        let isNam = Math.random() > 0.5;
        let full = getRandom(ho) + " " + (isNam ? getRandom(demNam) + " " + getRandom(tenNam) : getRandom(demNu) + " " + getRandom(tenNu));
        let genderStr = isNam ? "Nam" : "Nữ";
        
        let y = Math.floor(1992 + Math.random() * 15);
        let m = Math.floor(1 + Math.random() * 12);
        let d = Math.floor(1 + Math.random() * 28);
        let bdayStr = `${String(d).padStart(2,'0')}/${String(m).padStart(2,'0')}/${y}`;

        let sourcePhoneInput = document.getElementById("source_phone").value;
        let basicTweakedPhone = superTweakPhone(sourcePhoneInput);

        let cleanName = removeVietnameseTones(full).split(" ");
        let user = cleanName[cleanName.length - 1] + cleanName[0].charAt(0) + String(y).substring(2) + Math.floor(10 + Math.random()*89);

        let pass = "Sp" + Math.floor(100000 + Math.random() * 899999) + "@";

        let sourceAddrInput = document.getElementById("source_address").value;
        let streetAddressTweaked = tweakStreetAddress(sourceAddrInput);
        
        let xaObj = getRandom(dataHauGiang.phuongXa);
        let tuyenDuong = sourceAddrInput.trim() ? "" : `, ${getRandom(xaObj.tuyen)}`; 

        let notePhoneOption = document.getElementById("opt_note_phone").checked;
        let randomBrandOption = document.getElementById("opt_random_brand").checked;

        let prefixAddress = "";
        if (randomBrandOption) {
            prefixAddress = `(${getRandom(tapHoaBrands)} ${getRandom(tenRiengBrands)}) `;
        }

        // Tạo chuỗi Note đầy đủ bao quanh số điện thoại
        let fullNotePhoneStr = basicTweakedPhone; 
        if (notePhoneOption) {
            fullNotePhoneStr = getAdvancedNote(basicTweakedPhone).trim(); // Trả về cụm như: [Liên hệ trực tiếp 0325_506_7l6]
        }

        let addr = `${prefixAddress}${streetAddressTweaked}${tuyenDuong}, ${xaObj.xa}, ${dataHauGiang.quan}, ${dataHauGiang.tinh}${notePhoneOption ? ' ' + fullNotePhoneStr : ''}`;

        document.getElementById("fullname").value = full;
        document.getElementById("gender").value = genderStr;
        document.getElementById("birthday").value = bdayStr;
        
        // Đổ toàn bộ chuỗi có cấu trúc Note hoàn chỉnh ra ô hiển thị
        document.getElementById("phone").value = fullNotePhoneStr;
        
        document.getElementById("username").value = user;
        document.getElementById("password").value = pass;
        document.getElementById("address").value = addr;

        let log = { ip: currentIpAddress, name: full, gen: genderStr, bday: bdayStr, phone: fullNotePhoneStr, user: user, pass: pass, addr: addr };
        let history = JSON.parse(localStorage.getItem("shopee_m_logs")) || [];
        history.unshift(log);
        localStorage.setItem("shopee_m_logs", JSON.stringify(history));

        render();
    }

    function render() {
        let history = JSON.parse(localStorage.getItem("shopee_m_logs")) || [];
        let desktopHtml = "";
        let mobileHtml = "";

        if(history.length === 0) {
            let emptyMsg = `<tr><td colspan="8" style="text-align:center;color:#999;">Trống</td></tr>`;
            document.getElementById("desktop-tbody").innerHTML = emptyMsg;
            document.getElementById("mobile-cards-area").innerHTML = `<div style="text-align:center;color:#999;font-size:13px;padding:20px;">Chưa có dữ liệu log.</div>`;
            return;
        }

        history.forEach((item, index) => {
            let gClass = item.gen === "Nam" ? "gender-nam" : "gender-nu";
            
            desktopHtml += `<tr>
                <td>${index+1}</td>
                <td><span class="badge-ip">${item.ip}</span></td>
                <td>${item.name}</td>
                <td><span class="badge-gender ${gClass}">${item.gen}</span></td>
                <td style="font-weight:bold;color:#e65100;font-size:12px;">${item.phone || 'N/A'}</td>
                <td style="color:#2e7d32;font-weight:bold;">${item.user}</td>
                <td>${item.pass}</td>
                <td style="font-size:12px;">${item.addr}</td>
            </tr>`;

            mobileHtml += `<div class="card-item">
                <div style="position:absolute; right:10px; top:10px; font-size:11px; color:#aaa;">#${index+1}</div>
                <div class="card-row"><div class="card-label">IP Proxy:</div><div class="card-value"><span class="badge-ip">${item.ip}</span></div></div>
                <div class="card-row"><div class="card-label">Họ và Tên:</div><div class="card-value">${item.name} (<span class="badge-gender ${gClass}">${item.gen}</span>)</div></div>
                <div class="card-row"><div class="card-label">SĐT / S.Sinh:</div><div class="card-value"><b style="color:#e65100; font-size:12px;">${item.phone || 'N/A'}</b> | ${item.bday}</div></div>
                <div class="card-row"><div class="card-label">Username:</div><div class="card-value" style="color:#2e7d32; font-family:monospace;">${item.user}</div></div>
                <div class="card-row"><div class="card-label">Mật khẩu:</div><div class="card-value" style="font-family:monospace;">${item.pass}</div></div>
                <div class="card-row"><div class="card-label">Địa chỉ:</div><div class="card-value" style="font-size:12px; font-weight:normal; color:#d32f2f;">${item.addr}</div></div>
                <button class="card-action-btn" onclick="copyCombo('${item.user}', '${item.pass}')">Copy nhanh User | Pass</button>
            </div>`;
        });

        document.getElementById("desktop-tbody").innerHTML = desktopHtml;
        document.getElementById("mobile-cards-area").innerHTML = mobileHtml;
    }

    function getRandom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

    function copyText(id) {
        let el = document.getElementById(id);
        if(!el.value || el.value.includes("...")) return;
        el.select();
        navigator.clipboard.writeText(el.value);
        showToast("Đã copy ô dữ liệu!");
    }

    function copyCombo(user, pass) {
        navigator.clipboard.writeText(`${user}|${pass}`);
        showToast(`Đã copy: ${user} | ${pass}`);
    }

    function showToast(msg) {
        let t = document.getElementById("toast");
        t.innerText = msg;
        t.style.display = "block";
        setTimeout(() => { t.style.display = "none"; }, 1500);
    }

    function clearHistory() {
        if(confirm("Xóa sạch log?")) { localStorage.removeItem("shopee_m_logs"); render(); }
    }

    window.onload = function() { render(); fetchIp(); };
</script>
</body>
</html>
