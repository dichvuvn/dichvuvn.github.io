<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="/adrr/style.css">
    <script src="/adrr/app.js"></script>
    <title>Variant Generator Pro</title>
</head>
<body>

<div id="toast" class="toast"></div>

<div class="container">
    <h2>Variant Generator Pro</h2>

    <div class="section-title">Dữ Liệu Gốc Vào</div>
    
    <div class="form-group">
        <label>Tên người nhận gốc:</label>
        <input type="text" id="source_name" class="input-source" placeholder="Ví dụ: Nguyễn Văn A">
        <div class="hint">Nhập họ và tên vào hoặc để trống.</div>
    </div>

    <div class="form-group">
        <label>Số điện thoại gốc: <span style="color:#ee4d2d">*</span></label>
        <input type="text" id="source_phone" class="input-source" placeholder="Ví dụ: 0123456789">
        <div class="hint">Nhập số điện thoại gốc</div>
    </div>

    <div class="form-group">
        <label>Địa chỉ / Số nhà gốc: <span style="color:#aaa">(tuỳ chọn)</span></label>
        <input type="text" id="source_address" class="input-source" placeholder="Ví dụ: 33/11 Cống Trải, Phường Phú Thạnh, Quận Tân Phú, TP. HCM">
        <div class="hint">Nhập địa chỉ (số nhà + tên đường) để đảo chiều tự nhiên.</div>
    </div>

    <div class="checkbox-group">
        <label class="checkbox-label">
            <input type="checkbox" id="opt_tweak_name" checked> Biến tấu Tên
        </label>
        <label class="checkbox-label" title="Số điện thoại đan xen chữ, homoglyph và ký tự vô hình">
            <input type="checkbox" id="opt_shopee_bypass" checked> Note SĐT vào địa chỉ
        </label>
        <label class="checkbox-label" title="Đảo chiều số nhà và đường một cách tự nhiên">
            <input type="checkbox" id="opt_reverse_addr" checked> Đảo chiều Địa chỉ
        </label>
    </div>

    <button class="btn-main" onclick="processBypassAi()">Bắt Đầu Tạo Biến Thể</button>

    <div class="section-title">Kết Quả</div>

    <div class="form-group result-block" id="block_tweaked_name">
        <label>Tên Người Nhận Biến Tấu:</label>
        <div class="input-group">
            <input type="text" id="res_tweaked_name" class="has-btn" readonly style="color:#2e7d32; font-weight:bold;" placeholder="Chưa có dữ liệu...">
            <button class="btn-copy" onclick="copyText('res_tweaked_name')">Copy</button>
        </div>
    </div>

    <div class="form-group result-block" id="block_phone_note">
        <label>Note SĐT:</label>
        <div class="input-group">
            <input type="text" id="res_phone_note" class="has-btn" readonly style="color:#e65100; font-weight:bold;" placeholder="Chưa có dữ liệu...">
            <button class="btn-copy" onclick="copyText('res_phone_note')">Copy</button>
        </div>
    </div>

    <div class="form-group result-block" id="block_full_address">
        <label>Dòng Địa Đã Chỉnh:</label>
        <div class="input-group">
            <input type="text" id="res_full_address" class="has-btn" readonly style="color:#222; font-weight:500;" placeholder="Chưa có dữ liệu...">
            <button class="btn-copy" onclick="copyText('res_full_address')">Copy</button>
        </div>
        <div class="hint" id="addr_hint" style="display:none;">Nhập địa chỉ để sinh đường dẫn đầy đủ</div>
    </div>
</div>

</body>
</html>
