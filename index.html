<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTTP Performance Tester</title>

<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 font-sans">

<div class="container mx-auto p-6">

    <h1 class="text-3xl font-bold text-center mb-6">
        HTTP Performance Tester
    </h1>

    <div class="bg-white p-6 rounded-lg shadow-lg max-w-xl mx-auto">

        <div class="mb-4">
            <label class="block font-semibold mb-2">
                Target URL
            </label>

            <input
                id="target"
                type="text"
                placeholder="https://example.com"
                class="w-full p-2 border rounded"
            >
        </div>

        <div class="mb-4">
            <label class="block font-semibold mb-2">
                Duration (seconds)
            </label>

            <input
                id="duration"
                type="number"
                min="1"
                value="10"
                class="w-full p-2 border rounded"
            >
        </div>

        <div class="mb-4">
            <label class="block font-semibold mb-2">
                Requests per Second
            </label>

            <input
                id="rate"
                type="number"
                min="1"
                value="5"
                class="w-full p-2 border rounded"
            >
        </div>

        <button
            id="start"
            class="w-full bg-blue-500 text-white p-3 rounded hover:bg-blue-600"
        >
            Start Test
        </button>

        <div id="status" class="mt-4 font-semibold"></div>

    </div>

    <div
        id="results"
        class="mt-6 bg-white p-4 rounded-lg shadow-lg max-w-xl mx-auto h-96 overflow-auto"
    ></div>

</div>

<script>

const userAgents = [
    "Mozilla/5.0 Chrome/120",
    "Mozilla/5.0 Firefox/120",
    "Mozilla/5.0 Safari/17"
];

function randstr(length) {
    const chars =
        "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";

    let result = "";

    for (let i = 0; i < length; i++) {
        result += chars.charAt(
            Math.floor(Math.random() * chars.length)
        );
    }

    return result;
}

function randomElement(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
}

async function sendRequest(target) {

    const start = performance.now();

    try {

        const response = await fetch(
            `${target}?r=${randstr(10)}`,
            {
                method: "GET",
                cache: "no-store",
                headers: {
                    "Accept": "*/*",
                    "User-Agent": randomElement(userAgents)
                }
            }
        );

        const end = performance.now();

        return {
            success: true,
            status: response.status,
            time: (end - start).toFixed(0)
        };

    } catch (error) {

        return {
            success: false,
            error: error.message
        };

    }
}

async function runTest(target, duration, rate) {

    const status = document.getElementById("status");
    const results = document.getElementById("results");

    results.innerHTML = "";

    let success = 0;
    let failed = 0;

    status.innerHTML = "Running test...";

    const endTime = Date.now() + duration * 1000;

    const interval = setInterval(async () => {

        if (Date.now() >= endTime) {

            clearInterval(interval);

            status.innerHTML =
                `Completed | Success: ${success} | Failed: ${failed}`;

            return;
        }

        for (let i = 0; i < rate; i++) {

            const result = await sendRequest(target);

            const line = document.createElement("div");

            if (result.success) {

                success++;

                line.className = "text-green-600 text-sm";

                line.textContent =
                    `✅ ${result.status} | ${result.time}ms`;

            } else {

                failed++;

                line.className = "text-red-600 text-sm";

                line.textContent =
                    `❌ ${result.error}`;

            }

            results.prepend(line);

        }

    }, 1000);
}

document.getElementById("start")
.addEventListener("click", async () => {

    const target =
        document.getElementById("target").value.trim();

    const duration =
        parseInt(document.getElementById("duration").value);

    const rate =
        parseInt(document.getElementById("rate").value);

    if (!target) {
        alert("Nhập target URL");
        return;
    }

    if (!target.startsWith("http://") &&
        !target.startsWith("https://")) {

        alert("URL phải bắt đầu bằng http:// hoặc https://");
        return;
    }

    runTest(target, duration, rate);

});

</script>

</body>
</html>
