<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Safe HTTP Tester</title>

<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-6">

<div class="max-w-2xl mx-auto bg-white shadow rounded-xl p-6">

    <h1 class="text-2xl font-bold mb-6">
        Safe HTTP Tester
    </h1>

    <div class="mb-4">
        <label class="font-semibold block mb-2">
            API URL
        </label>

        <input
            id="target"
            type="text"
            placeholder="https://api.example.com/health"
            class="w-full border rounded p-3"
        >
    </div>

    <div class="grid grid-cols-2 gap-4 mb-4">

        <div>
            <label class="font-semibold block mb-2">
                Duration (seconds)
            </label>

            <input
                id="duration"
                type="number"
                value="10"
                min="1"
                max="60"
                class="w-full border rounded p-3"
            >
        </div>

        <div>
            <label class="font-semibold block mb-2">
                Requests/sec
            </label>

            <input
                id="rate"
                type="number"
                value="1"
                min="1"
                max="5"
                class="w-full border rounded p-3"
            >
        </div>

    </div>

    <button
        id="startBtn"
        class="bg-blue-500 hover:bg-blue-600 text-white px-5 py-3 rounded"
    >
        Start Test
    </button>

    <div id="summary" class="mt-6 font-semibold"></div>

    <div
        id="logs"
        class="mt-4 h-96 overflow-auto border rounded p-3 bg-gray-50 text-sm"
    ></div>

</div>

<script>

const logs = document.getElementById("logs");
const summary = document.getElementById("summary");

function log(text, ok = true) {

    const div = document.createElement("div");

    div.className = ok
        ? "text-green-600 mb-1"
        : "text-red-600 mb-1";

    div.textContent = text;

    logs.prepend(div);
}

async function testRequest(url) {

    const start = performance.now();

    try {

        const res = await fetch(url, {
            method: "GET",
            cache: "no-store"
        });

        const end = performance.now();

        return {
            ok: true,
            status: res.status,
            time: Math.round(end - start)
        };

    } catch (err) {

        return {
            ok: false,
            error: err.message
        };

    }

}

document.getElementById("startBtn")
.addEventListener("click", async () => {

    logs.innerHTML = "";
    summary.innerHTML = "";

    const target =
        document.getElementById("target").value.trim();

    const duration =
        parseInt(document.getElementById("duration").value);

    const rate =
        parseInt(document.getElementById("rate").value);

    if (!target.startsWith("http")) {

        alert("URL phải bắt đầu bằng http:// hoặc https://");

        return;
    }

    let success = 0;
    let failed = 0;
    let totalTime = 0;

    const endTime = Date.now() + duration * 1000;

    const interval = setInterval(async () => {

        if (Date.now() >= endTime) {

            clearInterval(interval);

            const avg =
                success
                ? Math.round(totalTime / success)
                : 0;

            summary.innerHTML = `
                Success: ${success}<br>
                Failed: ${failed}<br>
                Average latency: ${avg}ms
            `;

            return;
        }

        for (let i = 0; i < rate; i++) {

            const result = await testRequest(target);

            if (result.ok) {

                success++;
                totalTime += result.time;

                log(
                    `✅ ${result.status} | ${result.time}ms`
                );

            } else {

                failed++;

                log(
                    `❌ ${result.error}`,
                    false
                );

            }

        }

    }, 1000);

});

</script>

</body>
</html>
