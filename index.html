<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tools - QUANGAPI</title>
    <style>
        /* Thiết lập Tone màu Đỏ - Đen - Trắng */
        :root {
            --bg-dark: #121212;
            --bg-card: #1e1e1e;
            --primary-red: #ee4d2d; /* Đỏ Shopee/Modern Red */
            --text-light: #ffffff;
            --text-muted: #aaaaaa;
            --border-color: #333333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: var(--bg-card);
            max-width: 500px;
            width: 100%;
            border-radius: 16px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-color);
        }

        .logo-container {
            margin-bottom: 25px;
        }

        .logo-container img {
            max-height: 90px;
            max-width: 100%;
            object-fit: contain;
            filter: drop-shadow(0px 4px 10px rgba(238, 77, 45, 0.3));
        }

        h1 {
            font-size: 24px;
            margin-bottom: 15px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        p.description {
            color: var(--text-muted);
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 35px;
        }

        .btn-access {
            display: inline-block;
            background-color: var(--primary-red);
            color: white;
            text-decoration: none;
            padding: 14px 35px;
            font-weight: 600;
            font-size: 16px;
            border-radius: 30px;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(238, 77, 45, 0.4);
            width: 100%;
        }

        .btn-access:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(238, 77, 45, 0.6);
            background-color: #ff5733;
        }

        /* Hiệu ứng tải trang ẩn */
        .loading {
            opacity: 0.5;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="container id="app-container" class="loading">
        <div class="logo-container">
            <img id="tool-logo" src="" alt="Logo">
        </div>

        <h1 id="tool-name">Đang tải...</h1>

        <p id="tool-desc" class="description">Vui lòng đợi trong giây lát...</p>

        <a id="tool-link" href="#" target="_blank" class="btn-access">TRUY CẬP CÔNG CỤ NGAY</a>
    </div>

    <script>
        // Hàm tự động đọc file config.txt để thay đổi nội dung trang web
        async function loadConfig() {
            try {
                const response = await fetch('config.txt');
                if (!response.ok) {
                    throw new Error('Không thể tải file config.txt');
                }
                const data = await response.json();

                // Cập nhật dữ liệu vào giao diện HTML
                document.getElementById('tool-logo').src = data.toolLogo || 'https://via.placeholder.com/150';
                document.getElementById('tool-logo').alt = data.toolName;
                document.getElementById('tool-name').innerText = data.toolName;
                document.getElementById('tool-desc').innerText = data.toolDescription;
                document.getElementById('tool-link').href = data.toolLink;
                
                // Mở khóa giao diện sau khi tải xong
                document.getElementById('app-container').classList.remove('loading');
            } catch (error) {
                console.error('Lỗi cấu hình:', error);
                document.getElementById('tool-name').innerText = "Lỗi tải cấu hình";
                document.getElementById('tool-desc').innerText = "Hãy chắc chắn rằng bạn đã tạo file 'config.txt' đúng định dạng và đặt cùng thư mục với file HTML này.";
            }
        }

        // Chạy hàm khi trang web tải xong
        window.onload = loadConfig;
    </script>
</body>
</html>
